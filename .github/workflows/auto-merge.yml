name: Auto Merge PRs
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  enable-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Auto-Merge via GitHub CLI
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}